name: Docker

on:
  push:
    branches: [ "master", "main", "oracle-*" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "master", "main", "oracle-*" ]

env:
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build each platform on a native runner of the matching architecture.
  # Two reasons not to use one ubuntu-latest with both platforms:
  #   1. Memory: each Oracle init wants a ~1.5 GB SGA, and parallel builds
  #      for two platforms blow past the ~7 GB ubuntu-latest budget.
  #   2. QEMU emulation of arm64 on an amd64 host fails Oracle's PMON
  #      background-process spawn (ORA-00443) - the emulated shared-memory
  #      and process-spawning paths aren't faithful enough for Oracle.
  # Native arm64 runners (ubuntu-24.04-arm) are free for public repos and
  # avoid both problems.
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      # Required for cosign keyless signing via Sigstore/Fulcio.
      id-token: write

    steps:
      - name: Prepare platform pair
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${MATRIX_PLATFORM//\//-}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      # No QEMU step: each matrix entry runs on a native runner of its arch.

      # Login is only required when we actually push (i.e. on tag pushes).
      - name: Log into Docker Hub
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log into GHCR
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Non-tag push: just validate the build works on this platform.
      - name: Build (validate only)
        if: ${{ !(startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      # Tag push: build and push by digest to both registries. Pushing by
      # digest produces a single-platform image manifest with no tag; the
      # merge job below combines all platform digests into a tagged manifest
      # list.
      - name: Build and push by digest
        id: build
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: |
            type=image,name=${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
            type=image,name=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-platform digests pushed in the build matrix into a
  # tagged multi-arch manifest list, then sign the result with cosign.
  merge:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{major}}

      # Each registry needs its own manifest list created from its own
      # per-platform digests (digests are registry-local). Tags from
      # metadata-action are filtered per registry by jq.
      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          DOCKERHUB_IMAGE: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
          GHCR_IMAGE: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          dh_tag_args=$(jq -cr --arg p "$DOCKERHUB_IMAGE:" \
            '.tags | map(select(startswith($p))) | map("-t " + .) | join(" ")' \
            <<< "$DOCKER_METADATA_OUTPUT_JSON")
          ghcr_tag_args=$(jq -cr --arg p "$GHCR_IMAGE:" \
            '.tags | map(select(startswith($p))) | map("-t " + .) | join(" ")' \
            <<< "$DOCKER_METADATA_OUTPUT_JSON")
          dh_refs=$(printf "${DOCKERHUB_IMAGE}@sha256:%s " *)
          ghcr_refs=$(printf "${GHCR_IMAGE}@sha256:%s " *)
          # shellcheck disable=SC2086
          docker buildx imagetools create $dh_tag_args $dh_refs
          # shellcheck disable=SC2086
          docker buildx imagetools create $ghcr_tag_args $ghcr_refs

      - name: Inspect image
        env:
          IMAGE: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        run: docker buildx imagetools inspect "$IMAGE"

      # Keyless signing via Fulcio + Rekor. TAGS is passed via env (not
      # interpolated into run:) to avoid expression-injection attacks.
      - name: Sign the published Docker images
        env:
          COSIGN_EXPERIMENTAL: "true"
          TAGS: ${{ steps.meta.outputs.tags }}
        run: echo "$TAGS" | xargs -I {} cosign sign --yes {}
