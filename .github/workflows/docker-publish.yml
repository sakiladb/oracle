name: Docker

on:
  push:
    branches: [ "master", "oracle-*" ]
    # Numeric semver only - rejects typo'd tags like 'vfoo.bar.baz' which
    # would otherwise trigger a release build that emits no tags.
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]
    # Skip the multi-arch Oracle build (which takes ~10 min) for changes
    # that can't possibly affect the built image. paths-ignore is OR'd, so
    # a commit that touches only these files is skipped; a commit that
    # touches any of them plus a build-relevant file still runs.
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'Makefile'
      - 'docker-run.sh'
  pull_request:
    branches: [ "master", "oracle-*" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'Makefile'
      - 'docker-run.sh'

# Don't waste a 10-minute Oracle build on a stale ref. Cancel in-progress
# runs on the same branch/PR; never cancel an in-flight tag (release) run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Single source of truth for "this run will publish". Steps that push,
  # log in, or upload artifacts gate on this rather than re-deriving it.
  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}

# Third-party actions are SHA-pinned (with version comment) to defend
# against tag-move attacks on a compromised action repo. GitHub-owned
# actions/* are pinned by major - they're considered trusted.
jobs:
  build:
    # Build each platform on a native runner of the matching architecture.
    # Two reasons not to use one ubuntu-latest with both platforms:
    #   1. Memory: each Oracle init wants a ~1.5 GB SGA, and parallel builds
    #      for two platforms blow past the ~7 GB ubuntu-latest budget.
    #   2. QEMU emulation of arm64 on an amd64 host fails Oracle's PMON
    #      background-process spawn (ORA-00443) - the emulated shared-memory
    #      and process-spawning paths aren't faithful enough for Oracle.
    # Native arm64 runners (ubuntu-24.04-arm) are free for public repos and
    # avoid both problems.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      # Required for cosign keyless signing via Sigstore/Fulcio.
      id-token: write

    steps:
      - name: Prepare platform pair
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${MATRIX_PLATFORM//\//-}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # We don't push back to git; don't leave the GITHUB_TOKEN sitting
          # in .git/config where a later step could accidentally use it.
          persist-credentials: false

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      # No QEMU step: each matrix entry runs on a native runner of its arch.

      # Login is only required when we actually push (i.e. on tag pushes).
      - name: Log into Docker Hub
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log into GHCR
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Non-tag push: just validate the build works on this platform.
      - name: Build (validate only)
        if: ${{ env.IS_RELEASE != 'true' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      # Tag push: build and push by digest to both registries. Pushing by
      # digest produces a single-platform image manifest with no tag; the
      # merge job below combines all platform digests into a tagged manifest
      # list. provenance/sbom attach SLSA + SBOM attestations alongside the
      # image so downstream consumers (and `cosign verify-attestation`) can
      # audit the build.
      - name: Build and push by digest
        id: build
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: mode=max
          sbom: true
          outputs: |
            type=image,name=${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
            type=image,name=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        if: ${{ env.IS_RELEASE == 'true' }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-platform digests pushed in the build matrix into a
  # tagged multi-arch manifest list, then sign the result with cosign.
  merge:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log into Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log into GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Each tag push produces both `:<MAJOR>` (e.g. :23) and `:latest`,
      # so README quick-start commands using `:latest` track the most
      # recent release. Successive v23.x.y releases overwrite both in
      # place; a future v24.0.0 would land as :24 and shift :latest.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: |
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{major}}
            type=raw,value=latest

      # Each registry needs its own manifest list created from its own
      # per-platform digests (digests are registry-local). Tags from
      # metadata-action are filtered per registry by jq.
      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          DOCKERHUB_IMAGE: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
          GHCR_IMAGE: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          dh_tag_args=$(jq -cr --arg p "$DOCKERHUB_IMAGE:" \
            '.tags | map(select(startswith($p))) | map("-t " + .) | join(" ")' \
            <<< "$DOCKER_METADATA_OUTPUT_JSON")
          ghcr_tag_args=$(jq -cr --arg p "$GHCR_IMAGE:" \
            '.tags | map(select(startswith($p))) | map("-t " + .) | join(" ")' \
            <<< "$DOCKER_METADATA_OUTPUT_JSON")
          dh_refs=$(printf "${DOCKERHUB_IMAGE}@sha256:%s " *)
          ghcr_refs=$(printf "${GHCR_IMAGE}@sha256:%s " *)
          # shellcheck disable=SC2086
          docker buildx imagetools create $dh_tag_args $dh_refs
          # shellcheck disable=SC2086
          docker buildx imagetools create $ghcr_tag_args $ghcr_refs

      - name: Inspect Docker Hub image
        env:
          IMAGE: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        run: docker buildx imagetools inspect "$IMAGE"

      - name: Inspect GHCR image
        env:
          IMAGE: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        run: docker buildx imagetools inspect "$IMAGE"

      # Keyless signing via Fulcio + Rekor. TAGS is passed via env (not
      # interpolated into run:) to avoid expression-injection attacks.
      # --recursive signs the per-arch image manifests as well as the
      # multi-arch index, so scanners that verify children individually
      # still see a signature.
      - name: Sign the published Docker images
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: echo "$TAGS" | xargs -I {} cosign sign --yes --recursive {}
